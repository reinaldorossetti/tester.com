name: E2E Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecommerce

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Setup PostgreSQL
        uses: tj-actions/install-postgresql@v3
        with:
          postgresql-version: 17

      - name: Configure PostgreSQL database
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "ALTER USER postgres WITH PASSWORD 'postgres';"
          sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname = 'ecommerce'" | grep -q 1 || sudo -u postgres createdb ecommerce

      - name: Wait for PostgreSQL readiness
        run: |
          for i in {1..60}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres -d ecommerce; then
              echo "PostgreSQL pronto para conexões."
              exit 0
            fi
            echo "Aguardando PostgreSQL ficar pronto..."
            sleep 2
          done
          echo "PostgreSQL não ficou pronto no tempo esperado."
          exit 1

      - name: Seed backend database
        working-directory: server
        run: npm run seed

      - name: Start backend (Next.js) in background
        working-directory: server
        run: |
          nohup npm run dev > ../backend.log 2>&1 &
          echo $! > ../backend.pid
          echo "Backend PID: $(cat ../backend.pid)"

      - name: Wait for backend readiness (timeout)
        continue-on-error: true
        run: npx wait-on --timeout 180000 http://127.0.0.1:3001/api/products

      - name: Start frontend (Vite) in background
        run: |
          nohup npm run dev > frontend.log 2>&1 &
          echo $! > frontend.pid
          echo "Frontend PID: $(cat frontend.pid)"

      - name: Wait for frontend readiness (timeout)
        continue-on-error: true
        run: npx wait-on --timeout 180000 http://127.0.0.1:5174

      - name: Run E2E tests
        run: xvfb-run --auto-servernum npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload test results and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-and-logs
          path: |
            test-results
            junit-report.xml
            backend.log
            frontend.log
          if-no-files-found: ignore

      - name: Stop app processes
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi
          if [ -f frontend.pid ]; then
            kill $(cat frontend.pid) || true
          fi

  deploy-playwright-report:
    name: Deploy Playwright report to GitHub Pages
    needs: e2e
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Playwright report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Deploy Playwright report to gh-pages
        if: always() && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: playwright-report
          destination_dir: playwright-reports
          keep_files: true

