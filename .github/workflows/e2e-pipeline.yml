name: E2E Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write
  checks: write

jobs:
  unit-tests:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Run unit tests with coverage and JUnit
        run: |
          mkdir -p unit-test-report
          # Use set +e to continue execution even if tests fail so we can collect reports
          set +e
          npx vitest run \
            --coverage \
            --reporter=default \
            --reporter=junit \
            --outputFile=unit-test-report/junit.xml \
            | tee unit-test-report/console.log
          TEST_EXIT_CODE=$?
          set -e

          # Move coverage output into the artifact folder when available
          if [ -d coverage ]; then
            rm -rf unit-test-report/coverage
            cp -r coverage unit-test-report/coverage
          fi

          # Ensure JUnit file exists so upload-artifact always has at least one file
          if [ ! -f unit-test-report/junit.xml ]; then
            echo "JUnit report not found, creating dummy report"
            cat << 'EOF' > unit-test-report/junit.xml
          <testsuites>
            <testsuite name="vitest" tests="0" failures="0" errors="0" skipped="0" />
          </testsuites>
          EOF
          fi
          
          exit $TEST_EXIT_CODE

      - name: Publish unit test report in GitHub Actions
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit tests (Vitest)
          path: unit-test-report/junit.xml
          reporter: jest-junit
          fail-on-error: false

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: unit-test-report
          if-no-files-found: warn

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        project: [frontend-chromium, frontend-webkit, frontend-edge, api]
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecommerce

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Install backend dependencies
        working-directory: server
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Setup PostgreSQL
        uses: tj-actions/install-postgresql@v3
        with:
          postgresql-version: 17

      - name: Configure PostgreSQL database
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "ALTER USER postgres WITH PASSWORD 'postgres';"
          sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname = 'ecommerce'" | grep -q 1 || sudo -u postgres createdb ecommerce

      - name: Wait for PostgreSQL readiness
        run: |
          for i in {1..60}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres -d ecommerce; then
              echo "PostgreSQL pronto para conexões."
              exit 0
            fi
            echo "Aguardando PostgreSQL ficar pronto..."
            sleep 2
          done
          echo "PostgreSQL não ficou pronto no tempo esperado."
          exit 1

      - name: Seed backend database
        working-directory: server
        run: npm run seed

      - name: Start backend (Next.js) in background
        working-directory: server
        run: |
          nohup npm run dev > ../backend.log 2>&1 &
          echo $! > ../backend.pid
          echo "Backend PID: $(cat ../backend.pid)"

      - name: Wait for backend readiness (timeout)
        continue-on-error: true
        run: npx wait-on --timeout 180000 http://127.0.0.1:3001/api/products

      - name: Start frontend (Vite) in background
        run: |
          nohup npm run dev > frontend.log 2>&1 &
          echo $! > frontend.pid
          echo "Frontend PID: $(cat frontend.pid)"

      - name: Wait for frontend readiness (timeout)
        continue-on-error: true
        run: npx wait-on --timeout 180000 http://127.0.0.1:5174

      - name: Run E2E tests
        run: xvfb-run --auto-servernum npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload test results and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-and-logs-${{ matrix.project }}
          path: |
            test-results
            junit-report.xml
            backend.log
            frontend.log
          if-no-files-found: ignore

      - name: Stop app processes
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi
          if [ -f frontend.pid ]; then
            kill $(cat frontend.pid) || true
          fi

  deploy-playwright-report:
    name: Deploy Playwright report to GitHub Pages
    needs: [unit-tests, e2e]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Playwright report artifact
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-*
          path: tests-report

      - name: Download unit test report artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: unit-test-report
          path: tests-report/unit-tests

      - name: Generate Index HTML
        run: |
          cat << 'EOF' > tests-report/index.html
          <!DOCTYPE html>
          <html>
            <head><title>Test Reports</title><style>body { font-family: sans-serif; padding: 2rem; }</style></head>
            <body>
              <h1>Test Reports</h1>
              <ul>
                <li><a href="playwright-report-frontend-chromium/index.html">Chromium</a></li>
                <li><a href="playwright-report-frontend-edge/index.html">Edge</a></li>
                <li><a href="playwright-report-frontend-webkit/index.html">WebKit</a></li>
                <li><a href="playwright-report-api/index.html">API</a></li>
                <li><a href="unit-tests/coverage/index.html">Unit Tests Coverage (Vitest)</a></li>
                <li><a href="unit-tests/junit.xml">Unit Tests JUnit XML</a></li>
              </ul>
            </body>
          </html>
          EOF

      - name: Deploy Test reports to gh-pages
        if: always() && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: tests-report
          destination_dir: tests-report
          keep_files: true

