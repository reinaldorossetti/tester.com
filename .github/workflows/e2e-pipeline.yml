name: E2E Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start PostgreSQL with Docker Compose
        run: docker compose up -d

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if docker compose ps --format json | grep -q '"health":"healthy"'; then
              echo "PostgreSQL está saudável."
              exit 0
            fi
            echo "Aguardando PostgreSQL ficar healthy..."
            sleep 2
          done
          echo "PostgreSQL não ficou healthy a tempo."
          docker compose ps
          exit 1

      - name: Seed backend database
        working-directory: server
        run: npm run seed

      - name: Start backend (Next.js) in background
        working-directory: server
        run: |
          nohup npm run dev > ../backend.log 2>&1 &
          echo $! > ../backend.pid
          echo "Backend PID: $(cat ../backend.pid)"

      - name: Wait for backend readiness (timeout)
        run: npx wait-on --timeout 180000 http://127.0.0.1:3001/api/products

      - name: Start frontend (Vite) in background
        run: |
          nohup npm run dev > frontend.log 2>&1 &
          echo $! > frontend.pid
          echo "Frontend PID: $(cat frontend.pid)"

      - name: Wait for frontend readiness (timeout)
        run: npx wait-on --timeout 180000 http://127.0.0.1:5174

      - name: Run E2E tests
        run: xvfb-run --auto-servernum npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload test results and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-and-logs
          path: |
            test-results
            junit-report.xml
            backend.log
            frontend.log
          if-no-files-found: ignore

      - name: Stop app processes
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi
          if [ -f frontend.pid ]; then
            kill $(cat frontend.pid) || true
          fi

      - name: Stop docker services
        if: always()
        run: docker compose down -v
