openapi: 3.0.3
info:
  title: Tester.com API
  version: 1.0.0
  description: |
    O amazonQA é uma Aplicação completa com API REST gratuita feita com next.js, que simula uma loja virtual com intuito de servir de material de estudos de testes de API e Web.
    Não deixe de seguir o autor do projeto Reinaldo M R Junior no LinkedIn: https://www.linkedin.com/in/reinaldo-mateus-rossetti-a28a5423/
    E deixar um star no repositório: https://github.com/reinaldorossetti/amazonQA.com
servers:
  - url: http://127.0.0.1:3001
    description: Backend local (Next.js)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
          format: float
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        manufacturer:
          type: string
          nullable: true
        line:
          type: string
          nullable: true
        model:
          type: string
          nullable: true

    UserSafe:
      type: object
      properties:
        id:
          type: integer
        person_type:
          type: string
          enum: [PF, PJ]
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
        user:
          type: object

    CartItem:
      type: object
      properties:
        id:
          type: integer
        quantity:
          type: integer
        added_at:
          type: string
          format: date-time
        product_id:
          type: integer
        name:
          type: string
        price:
          type: number

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: integer
        product_id:
          type: integer
        product_name_snapshot:
          type: string
        unit_price_snapshot:
          type: number
          format: float
        quantity:
          type: integer
        line_total:
          type: number
          format: float
        created_at:
          type: string
          format: date-time

    Order:
      type: object
      properties:
        id:
          type: integer
        order_number:
          type: string
          example: ORD-20260327-000001
        user_id:
          type: integer
        status:
          type: string
          enum: [created, paid, processing, shipped, delivered, cancelled]
        subtotal:
          type: number
          format: float
        shipping_total:
          type: number
          format: float
        discount_total:
          type: number
          format: float
        grand_total:
          type: number
          format: float
        currency:
          type: string
          example: BRL
        payment_method:
          type: string
          nullable: true
        idempotency_key:
          type: string
          nullable: true
        shipping_address:
          type: object
          nullable: true
          additionalProperties: true
        billing_info:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

    OrderSummary:
      type: object
      properties:
        id:
          type: integer
        order_number:
          type: string
        user_id:
          type: integer
        status:
          type: string
        subtotal:
          type: number
          format: float
        shipping_total:
          type: number
          format: float
        discount_total:
          type: number
          format: float
        grand_total:
          type: number
          format: float
        currency:
          type: string
        payment_method:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        cancelled_at:
          type: string
          format: date-time
          nullable: true

    OrdersListResponse:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'

    CreateOrderRequest:
      type: object
      properties:
        shippingTotal:
          type: number
          format: float
          default: 0
        discountTotal:
          type: number
          format: float
          default: 0
        paymentMethod:
          type: string
          nullable: true
        shippingAddress:
          type: object
          nullable: true
          additionalProperties: true
        billingInfo:
          type: object
          nullable: true
          additionalProperties: true

    UpdateOrderRequest:
      type: object
      properties:
        status:
          type: string
          enum: [created, paid, processing, shipped, delivered, cancelled]
        paymentMethod:
          type: string
          nullable: true

security: []

paths:
  /api/products:
    get:
      tags: [Products]
      summary: "Listar produtos (Acesso: público)"
      parameters:
        - in: query
          name: category
          schema:
            type: string
      responses:
        '200':
          description: Lista de produtos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '500':
          description: Erro interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Products]
      summary: "Criar produto (Acesso: público)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Produto criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Dados inválidos

  /api/products/{id}:
    get:
      tags: [Products]
      summary: "Buscar produto por ID (Acesso: público)"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Produto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Produto não encontrado

    put:
      tags: [Products]
      summary: "Atualizar produto (Acesso: público)"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '200':
          description: Produto atualizado
        '404':
          description: Produto não encontrado

    delete:
      tags: [Products]
      summary: "Excluir produto (Acesso: público)"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Produto removido
        '404':
          description: Produto não encontrado

  /api/users/register:
    post:
      tags: [Users]
      summary: "Cadastro de usuário (Acesso: público)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email, password]
              properties:
                person_type:
                  type: string
                  enum: [PF, PJ]
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '201':
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSafe'
        '409':
          description: Conflito de e-mail/CPF/CNPJ

  /api/users/login:
    post:
      tags: [Users]
      summary: "Login de usuário (Acesso: público)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciais inválidas
        '403':
          description: Conta inativa/encerrada

  /api/users:
    get:
      tags: [Users]
      summary: "Listar usuários cadastrados (Acesso: admin)"
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: pageSize
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
            enum: [all, active, closed]
      responses:
        '200':
          description: Listagem paginada
        '401':
          description: Não autenticado
        '403':
          description: Requer admin

    post:
      tags: [Users]
      summary: "Cadastrar novo usuário (Acesso: admin)"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email, password]
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [user, admin]
      responses:
        '201':
          description: Usuário criado
        '403':
          description: Requer admin

  /api/users/{id}:
    get:
      tags: [Users]
      summary: "Buscar usuário por ID (Acesso: admin ou próprio usuário)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuário encontrado
        '403':
          description: Sem permissão

    put:
      tags: [Users]
      summary: "Editar usuário existente (Acesso: admin ou próprio usuário)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Usuário atualizado
        '403':
          description: Sem permissão

    delete:
      tags: [Users]
      summary: "Excluir usuário por ID - hard delete (Acesso: admin)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuário removido
        '403':
          description: Requer admin

  /api/users/{id}/terminate:
    post:
      tags: [Users]
      summary: "Encerrar conta com ofuscação (Acesso: admin ou próprio usuário)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Conta encerrada
        '403':
          description: Sem permissão

  /api/cart:
    get:
      tags: [Cart]
      summary: "Listar itens do carrinho (Acesso: usuário autenticado, apenas próprio carrinho)"
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: userId
          schema:
            type: integer
      responses:
        '200':
          description: Itens do carrinho
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CartItem'

    post:
      tags: [Cart]
      summary: "Adicionar itens ao carrinho em lote (Acesso: usuário autenticado, apenas próprio carrinho)"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [products]
              properties:
                products:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [productId]
                    properties:
                      productId:
                        type: integer
                        minimum: 1
                      quantity:
                        type: integer
                        default: 1
                        minimum: 1
                        maximum: 99
      responses:
        '201':
          description: Itens adicionados/incrementados
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CartItem'
                  processed:
                    type: integer
        '400':
          description: "Payload inválido, produto duplicado, produto não encontrado ou quantidade insuficiente"
        '401':
          description: Token de acesso ausente, inválido, expirado ou usuário do token não existe mais

    delete:
      tags: [Cart]
      summary: "Remover item do carrinho (Acesso: usuário autenticado, apenas próprio carrinho)"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cartItemId]
              properties:
                cartItemId:
                  type: integer
      responses:
        '200':
          description: Item removido

  /api/cart/{id}:
    get:
      tags: [Cart]
      summary: "Buscar item do carrinho por ID (Acesso: usuário autenticado, apenas próprio carrinho)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Item do carrinho encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartItem'
        '404':
          description: Carrinho não encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Carrinho não encontrado

  /api/orders:
    get:
      tags: [Orders]
      summary: "Listar pedidos (Acesso: autenticado; usuário vê próprios pedidos, admin pode filtrar todos)"
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: status
          schema:
            type: string
            enum: [created, paid, processing, shipped, delivered, cancelled]
        - in: query
          name: userId
          description: "Somente para administradores"
          schema:
            type: integer
      responses:
        '200':
          description: Lista paginada de pedidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersListResponse'
        '401':
          description: Não autenticado

    post:
      tags: [Orders]
      summary: "Criar pedido a partir do carrinho autenticado"
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
          description: "Chave para evitar criação duplicada em reenvios"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Pedido criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '200':
          description: Pedido retornado por idempotência (já existente)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Carrinho vazio ou payload inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado

  /api/orders/{id}:
    get:
      tags: [Orders]
      summary: "Buscar pedido por ID (Acesso: dono do pedido ou admin)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Pedido encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          description: Não autenticado
        '403':
          description: Sem permissão
        '404':
          description: Pedido não encontrado

    put:
      tags: [Orders]
      summary: "Atualizar pedido (Acesso: dono do pedido ou admin, com regras de transição)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderRequest'
      responses:
        '200':
          description: Pedido atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Transição de status inválida ou payload inválido
        '401':
          description: Não autenticado
        '403':
          description: Sem permissão
        '404':
          description: Pedido não encontrado

    delete:
      tags: [Orders]
      summary: "Cancelar pedido (cancelamento lógico)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Pedido cancelado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Pedido cancelado
                  order:
                    $ref: '#/components/schemas/Order'
        '400':
          description: Pedido não elegível para cancelamento
        '401':
          description: Não autenticado
        '403':
          description: Sem permissão
        '404':
          description: Pedido não encontrado
